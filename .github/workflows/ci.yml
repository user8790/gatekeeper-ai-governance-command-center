name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest

      - name: Compile sources
        env:
          PYTHONPATH: src
        run: python -m compileall src streamlit_app.py

      - name: Smoke import app
        env:
          PYTHONPATH: src
        run: python -c "import streamlit_app; print('app import ok')"

